<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabbit Escape</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="menu-shell">
    <div class="menu-overlay"></div>

    <main class="menu-content">
      <section class="menu-panel">
        <div class="menu-buttons">
          <button id="playBtn" class="menu-btn primary">Play Level 1</button>
          <button id="level2Btn" class="menu-btn secondary">Play Level 2</button>
        </div>

        <div class="level-cards">
          <button class="level-card level1" id="cardLevel1">
            <span class="level-label">LEVEL 1</span>
            <strong>School Escape</strong>
            <span>Collect 4 keys and escape</span>
          </button>

          <button class="level-card level2" id="cardLevel2">
            <span class="level-label">LEVEL 2</span>
            <strong>Venezia Pizzaria</strong>
            <span>Collect 5 keys and escape</span>
          </button>

          <div class="level-card locked">
            <span class="level-label">LEVEL 3</span>
            <strong>Coming Soon</strong>
            <span>More maps later</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
