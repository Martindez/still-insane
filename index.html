<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Still Insane</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="menu-screen" onclick="unlockAudio()">
    <div class="menu-buttons">
      <button onclick="playGame()">PLAY</button>
      <button onclick="toggleMute()" id="muteBtn">MUTE</button>
      <button onclick="openReadMe()">READ ME</button>
    </div>

    <audio id="menuMusic" loop autoplay muted>
      <source src="assets/game-ambient.mp3" type="audio/mpeg" />
    </audio>
  </main>

  <script src="script.js"></script>
</body>
</html>
