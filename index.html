<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabbit Escape</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="menu">
    <section class="menu-panel">
      <button id="playBtn" class="menu-btn play">Play Game</button>
      <button id="readBtn" class="menu-btn read">Read Me</button>
    </section>

    <section id="readPanel" class="read-panel" aria-hidden="true">
      <div class="read-card">
        <h2>Read Me</h2>
        <p>Find the keys, move room to room, and escape before the killer rabbit catches you.</p>
        <p>Click rooms to move. Watch your danger bar. Use your chances wisely.</p>
        <button id="closeReadBtn" class="close-btn">Close</button>
      </div>
    </section>

    <section id="loading" class="loading" aria-hidden="true">
      <div class="loader"></div>
      <p>Entering the school...</p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
