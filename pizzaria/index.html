<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabbit Escape - Pizzaria</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <audio id="ambientMusic" src="../assets/game-ambient.mp3" loop preload="auto"></audio>
  <audio id="jumpscareSound" src="../assets/jumpscare.mp3" preload="auto"></audio>

  <div id="flashOverlay" class="flash-overlay"></div>

  <div id="jumpscareOverlay" class="jumpscare-overlay hidden">
    <img src="../assets/killer.png" alt="" class="jumpscare-killer" draggable="false" />
    <div class="jumpscare-text">CAUGHT!</div>
  </div>

  <main class="app">
    <header class="topbar">
      <h1>Rabbit Escape</h1>
      <p>Level 2 · Pizzaria</p>
    </header>

    <section id="hud" class="panel">
      <div class="hud-grid">
        <div><strong>Keys:</strong> <span id="keyCount">0</span>/5</div>
        <div><strong>Hearts:</strong> <span id="hearts">❤️</span></div>
        <div><strong>Player:</strong> <span id="playerRoom">Dining</span></div>
        <div><strong>Killer:</strong> <span id="killerRoom">Storage</span></div>
        <div><strong>Exit:</strong> <span id="exitState">Locked</span></div>
      </div>
      <p id="messageText" class="message">Find 5 keys and escape.</p>
    </section>

    <section id="gameWrap" class="panel">
      <div class="map-board">
        <img src="./assets/map.jpg" alt="Pizzaria map" class="map-image" />

        <button class="room-hotspot kitchen" data-room="Kitchen" type="button"></button>
        <button class="room-hotspot storage" data-room="Storage" type="button"></button>
        <button class="room-hotspot staff" data-room="Staff" type="button"></button>
        <button class="room-hotspot arcade" data-room="Arcade" type="button"></button>
        <button class="room-hotspot dining" data-room="Dining" type="button"></button>
        <button class="room-hotspot bath" data-room="Bath" type="button"></button>
        <button class="room-hotspot delivery" data-room="Delivery" type="button"></button>
        <button class="room-hotspot oven" data-room="Oven" type="button"></button>
        <button class="room-hotspot exit-room" data-room="Exit" type="button"></button>

        <div id="keyLayer" class="key-layer"></div>

        <img id="playerToken" class="token player-token" src="../assets/player.png" alt="Player" />
        <img id="killerToken" class="token killer-token" src="../assets/killer.png" alt="Killer" />
      </div>
    </section>

    <section id="endScreen" class="panel screen hidden">
      <h2 id="endTitle">You Escaped!</h2>
      <p id="endText">You escaped the pizzaria.</p>
      <button id="restartBtn" class="main-btn" type="button">Play Again</button>
      <button id="menuBtn" class="main-btn" type="button">Main Menu</button>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
