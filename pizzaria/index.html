<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rabbit Escape - Pizzaria</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<header class="topbar">
<h1>Rabbit Escape</h1>
<p class="subtitle">Level 2 - Pizzaria Night Shift</p>
</header>

<section id="startScreen" class="panel screen">
<h2>Level 2</h2>
<p>Collect all 5 keys and escape the pizzaria.</p>
<p>The killer rabbit is faster now.</p>
<button id="startBtn" class="main-btn">Start Level 2</button>
</section>

<section id="hud" class="panel hidden">
<div class="hud-grid">
<div><strong>Goal:</strong> <span id="goalText">Find 5 keys</span></div>
<div><strong>Keys:</strong> <span id="keyCount">0</span>/5</div>
<div><strong>Hearts:</strong> <span id="hearts">❤️ ❤️ ❤️</span></div>

<div><strong>Danger:</strong> <span id="dangerText">Low</span></div>
<div><strong>Player:</strong> <span id="playerRoom">Dining</span></div>
<div><strong>Killer:</strong> <span id="killerRoom">Staff</span></div>

<div><strong>Exit:</strong> <span id="exitState">Locked</span></div>
<div><strong>Best:</strong> <span id="bestTime">--</span></div>
</div>

<div class="danger-bar-wrap">
<div id="dangerBar" class="danger-bar"></div>
</div>
</section>

<section id="gameWrap" class="panel hidden">
<div class="map-board">

<img src="./assets/map.jpg" class="map-image" alt="Pizzaria map">

<button class="room-marker kitchen" data-room="Kitchen"></button>
<button class="room-marker storage" data-room="Storage"></button>
<button class="room-marker staff" data-room="Staff"></button>

<button class="room-marker arcade" data-room="Arcade"></button>
<button class="room-marker dining" data-room="Dining"></button>
<button class="room-marker bath" data-room="Bathrooms"></button>

<button class="room-marker delivery" data-room="Delivery"></button>
<button class="room-marker oven" data-room="Oven"></button>
<button class="room-marker exit-room" data-room="Exit"></button>

<img src="./assets/map.jpg" class="map-image" alt="Pizzaria map">
<img id="playerToken" class="token player-token" src="../assets/player.png" alt="Player">
<img id="killerToken" class="token killer-token" src="../assets/killer.png" alt="Killer">

</div>
</section>

<section id="messageBox" class="panel hidden">
<p id="messageText">Messages here.</p>
</section>

<section id="endScreen" class="panel screen hidden">
<h2 id="endTitle">You Win!</h2>
<p id="endText">You escaped!</p>
<button id="restartBtn" class="main-btn">Play Again</button>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
