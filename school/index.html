<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabbit Escape - School</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="flashOverlay" class="flash-overlay"></div>

  <div id="jumpscareOverlay" class="jumpscare-overlay hidden">
    <img src="../assets/killer.png" alt="Killer Rabbit" class="jumpscare-killer" />
    <div class="jumpscare-text">CAUGHT!</div>
  </div>

  <main class="app">
    <header class="topbar">
      <h1>Rabbit Escape</h1>
      <p>Level 1 · School</p>
    </header>

    <section id="startScreen" class="panel screen">
      <h2>School Escape</h2>
      <button id="startBtn" class="main-btn" type="button">Start</button>
    </section>

    <section id="hud" class="panel hidden">
      <div class="hud-grid">
        <div><strong>Keys:</strong> <span id="keyCount">0</span>/4</div>
        <div><strong>Hearts:</strong> <span id="hearts">❤️ ❤️ ❤️</span></div>
        <div><strong>Player:</strong> <span id="playerRoom">Playground</span></div>
        <div><strong>Killer:</strong> <span id="killerRoom">Kitchen</span></div>
        <div><strong>Exit:</strong> <span id="exitState">Locked</span></div>
      </div>
      <p id="messageText" class="message">Find 4 keys and escape.</p>
    </section>

    <section id="gameWrap" class="panel hidden">
      <div class="map-board">
        <img src="./assets/map.jpg" alt="School map" class="map-image" />

        <button class="room-hotspot electrical" data-room="Electrical" type="button"></button>
        <button class="room-hotspot gym" data-room="Gym" type="button"></button>
        <button class="room-hotspot kitchen" data-room="Kitchen" type="button"></button>
        <button class="room-hotspot security" data-room="Security" type="button"></button>
        <button class="room-hotspot playground" data-room="Playground" type="button"></button>
        <button class="room-hotspot exit-room" data-room="Exit" type="button"></button>

        <div class="room-ring electrical-ring" data-ring="Electrical"></div>
        <div class="room-ring gym-ring" data-ring="Gym"></div>
        <div class="room-ring kitchen-ring" data-ring="Kitchen"></div>
        <div class="room-ring security-ring" data-ring="Security"></div>
        <div class="room-ring playground-ring" data-ring="Playground"></div>
        <div class="room-ring exit-ring" data-ring="Exit"></div>

        <div id="keyLayer" class="key-layer"></div>

        <img id="playerToken" class="token player-token" src="../assets/player.png" alt="Player" />
        <img id="killerToken" class="token killer-token" src="../assets/killer.png" alt="Killer" />
      </div>
    </section>

    <section id="endScreen" class="panel screen hidden">
      <h2 id="endTitle">You Escaped!</h2>
      <p id="endText">You escaped the school.</p>
      <button id="restartBtn" class="main-btn" type="button">Play Again</button>
      <button id="nextLevelBtn" class="main-btn hidden" type="button">Next Level</button>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
