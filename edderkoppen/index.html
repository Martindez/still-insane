<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Still Insane - Edderkoppen</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <audio id="ambientMusic" src="../assets/game-ambient.mp3" loop preload="auto"></audio>
  <audio id="jumpscareSound" src="../assets/jumpscare.mp3" preload="auto"></audio>

  <div id="flashOverlay" class="flash-overlay"></div>

  <div id="jumpscareOverlay" class="jumpscare-overlay hidden">
    <img src="../assets/killer.png" alt="" class="jumpscare-killer" draggable="false" />
    <div class="jumpscare-text">CAUGHT!</div>
  </div>

  <main class="app">
    <header class="topbar">
      <h1>Still Insane</h1>
      <p>Level 3 · Edderkoppen</p>
    </header>

    <section id="hud" class="panel">
      <div class="hud-grid">
        <div><strong>Keys:</strong> <span id="keyCount">0</span>/4</div>
        <div><strong>Hearts:</strong> <span id="hearts">❤️</span></div>
        <div><strong>Player:</strong> <span id="playerRoom">Edderkoppen</span></div>
        <div><strong>Killer:</strong> <span id="killerRoom">Fantasirommet</span></div>
        <div><strong>Exit:</strong> <span id="exitState">Locked</span></div>
      </div>
      <p id="messageText" class="message">Find 4 keys and escape through Gangen.</p>
    </section>

    <section id="gameWrap" class="panel">
      <div class="map-board">
        <img src="./assets/edderkoppen.jpg" alt="Edderkoppen map" class="map-image" />

        <button class="room-hotspot fantasirommet" data-room="Fantasirommet" type="button"></button>
        <button class="room-hotspot trapper" data-room="Trapper" type="button"></button>
        <button class="room-hotspot byggeplassen" data-room="Byggeplassen" type="button"></button>
        <button class="room-hotspot spelebula" data-room="Spelebula" type="button"></button>
        <button class="room-hotspot edderkoppen-room" data-room="Edderkoppen" type="button"></button>
        <button class="room-hotspot toalett" data-room="Toalett" type="button"></button>
        <button class="room-hotspot legorommet" data-room="Legorommet" type="button"></button>
        <button class="room-hotspot gangen" data-room="Gangen" type="button"></button>

        <div id="keyLayer" class="key-layer"></div>

        <img id="playerToken" class="token player-token" src="../assets/player.png" alt="Player" />
        <img id="killerToken" class="token killer-token" src="../assets/killer.png" alt="Killer" />
      </div>
    </section>

    <section id="endScreen" class="panel screen hidden">
      <h2 id="endTitle">YOU SURVIVED!</h2>
      <p id="endText">You escaped all 3 levels of Still Insane!</p>
      <button id="restartBtn" class="main-btn" type="button">Play Again</button>
      <button id="nextLevelBtn" class="main-btn hidden" type="button">Next Level</button>
      <button id="menuBtn" class="main-btn" type="button">Main Menu</button>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
